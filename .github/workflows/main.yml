name: Monthly Manufacturer Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 15 * *"

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: pip install yfinance openpyxl xlrd matplotlib numpy --break-system-packages -q

      - name: Install Node dependencies
        run: npm install --no-package-lock

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Generate charts
        run: python scripts/gen_charts.py

      - name: Generate PPTX
        run: node scripts/gen_pptx.js

      - name: Generate Excel
        run: python scripts/gen_excel.py

      - name: Send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_DATE: ${{ env.REPORT_DATE }}
        run: python scripts/send_email.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturer-report-${{ env.REPORT_DATE }}
          path: |
            output/Manufacturer_Intelligence_Report_*.pptx
            output/Manufacturer_Data_*.xlsx
          retention-days: 90
